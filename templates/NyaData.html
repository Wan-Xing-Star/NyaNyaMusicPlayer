<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/img/main.ico">
    <link rel="stylesheet" type="text/css" href="/static/css/main.css">
    <title>NyaData - 播放数据展示</title>
</head>
<body>
    <!-- 导航栏部分,所有数据在同一页面内 -->
    <header>
        <div id="nav">
            <ul>
                <li><a href="/main">数据总览</a></li>
                <li><a href="/each">各歌曲信息</a></li>
                <li style="float:right" id="nav_about"><a href="/about">关于</a></li>
            </ul>
        </div>
    </header>

    <!-- 各部分数据,用表格承接 -->
    <h2>数据总览</h2>
    <div id="totalHour">
        <table id="totalHour_table">
            <tr>
                <th>总播放数据</th>
            </tr>
        </table>
        <table id="monthData_table">
            <tr>
                <th colspan="2">每月播放数据</th>
            </tr>
            <tr>
                <th>月份</th>
                <th>播放时长</th>
            </tr>
        </table>
    </div>

    <!-- 脚本设置 -->
    <script>
        // 数据格式 数据整体all_data ; 总时长total_hours ; 本年年份year ; [月份,月数据,...]数组monthData
        // 使用flask接收json的变量
        const allData = {{all_data|tojson}};
        const year = allData[0];
        const totalHour = allData[1];
        const monthData = allData[2];

        // 向总播放时长写入信息
        window.addEventListener("DOMContentLoaded", function() {
            let table = document.getElementById("totalHour_table");
            let newRow = table.insertRow(-1);
            let new_data1 = newRow.insertCell(0);
            if (totalHour != 0) {
                new_data1.innerText = `${totalHour}小时`;
            } else {
                new_data1.innerText = `未记录到播放时长`;
            }
            
        });

        // 向每月时长写入信息
        window.addEventListener("DOMContentLoaded", function() {
            let table = document.getElementById("monthData_table");
            for (let i=0; i<monthData.length-1; i++) {
                table.insertRow(-1);
                newRow.insertCell(0); // 对不同索引位置的表格添加数据
                newRow.insertCell(1);
                new_data1.innerText = `${year}年${monthData[i]}`
                new_data2.innerText = `${monthData[i+1]}小时`
            }
            
        });
    </script>
</body>
</html>
