<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/img/main.ico">
    <link rel="stylesheet" type="text/css" href="/static/css/main.css">
    <title>NyaDay - 每日数据展示</title>
</head>
<body>
    <!-- 导航栏部分,所有数据在同一页面内 -->
    <header>
        <div id="nav">
            <ul>
                <li><a href="/">数据总览</a></li>
                <li><a href="/AllSong">所有歌曲</a></li>
                <li><a href="/song">单曲信息</a></li>
                <li><a href="/artist">歌手信息</a></li>
                <li><a id="dayAnchor" href="/day">每日数据</a></li>
                <li style="float:right" id="nav_about"><a href="/about">关于</a></li>
            </ul>
        </div>
    </header>
    <h2>每日数据</h2>
    <div id="day">
        <table id="dayTotal_table">
            <tr>
                <th>今日播放总时长</th>
            </tr>
        </table>
        <table id="dayEach_table">
            <tr>
                <th>歌曲名<input type="submit" id="nameSort" value="升序" onclick="nameSort(); return false;"></th>
                <th>播放次数</th>
            </tr>
        </table>
    </div>
    
    <!-- 脚本设置 -->
    <script>
        let dayTotal = {{day_total | tojson}}; // int或null,精确到分
        let dayEach = {{day_each | tojson}}; // dic或null,传递为完播歌曲{name:[完播次数,循环次数]}
        let dayEach_name; // 歌曲名
        let dayEach_time; // 播放次数
        console.log(`本日播放${dayTotal}分`);
        console.log(`歌曲信息${dayEach}`);
        // 向总时长写入数据
        function dayTotal_write(dayTotal) {
            let table = document.getElementById("dayTotal_table");
            let newRow = table.insertRow(-1);
            let newCell = newRow.insertCell(0);
            newCell.innerText = `${dayTotal}`;
            console.log("已添加每日总时长至表格")
        };

        // 向每日歌曲信息写入数据(如有)
        function dayEach_write(dayEach_name, dayEach_time) {
            let table = document.getElementById("dayEach_table");
            let newRow = table.insertRow(-1);
            newRow.innerHTML = `
                <td><a href="/song?songname=${dayEach_name}">${dayEach_name}</td>
                <td>${dayEach_time}</td>`
            console.log("已添加歌曲信息至表格");
        };

        // 删除表格内容
        function tableDelete() {
            let table = document.getElementById("dayEach_table");
            while (table.rows.length > 1) {
                table.deleteRow(1);
            }
            table = document.getElementById("dayTotal_table");
            table.deleteRow(1);
        }

        // 判断是否存在数据
        function dayBranch() {
            if (dayTotal == (null || undefined)) {
                // 无总时长
                dayTotal = `本日还没有听歌喵~`;
                dayEach_name = `本日还没有听歌喵~`;
                dayEach_time = `本日还没有听歌喵~`;
                console.log(`全部信息无`);
                dayTotal_write(dayTotal);
                dayEach_write(dayEach_name, dayEach_time);
            } else if (dayEach == (null || undefined)) {
                // 有总时长而无完播歌曲信息
                console.log(`完播歌曲信息无`);
                dayEach_name = `多听一会儿再来喵`;
                dayEach_time = `多听一会儿再来喵`;
                dayTotal += "分钟";
                dayTotal_write(dayTotal);
                dayEach_write(dayEach_name, dayEach_time);
            } else {
                // 均有
                dayTotal += `分钟`;
                console.log(`本日信息完全`);
                dayTotal_write(dayTotal);
                for (let key in dayEach) {
                    dayEach_time = dayEach[key][0];
                    console.log(`曲名${key},播放次数${dayEach_time}`)
                    dayEach_name = `${key}`;
                    dayEach_time = `${dayEach_time}次`;
                    dayEach_write(dayEach_name, dayEach_time);
                }
            };
        };

        // 更改按照歌曲名的排序方式
        function nameSort() {
            let temporaryArr = [];
            let temporaryDic = {};
            for (let key in dayEach) {
                temporaryArr.unshift(key);
            }
            for (let i = 0; i < temporaryArr.length; i++) {
                temporaryDic[temporaryArr[i]] = dayEach[temporaryArr[i]]
            }
            dayEach = {};
            dayEach = temporaryDic;
            dayTotal = dayTotal.split("分钟")[0];
            tableDelete();
            dayBranch();
        }

        // 获取当日日期YYYYMMDD,写入a标签html
        function urlWrite() {
            const date = new Date();
            console.log(date);
            let nowDate = date.getFullYear();
            if (date.getMonth() + 1 <= 10) {
                nowDate += `0${date.getMonth() + 1}`;
            } else {
                nowDate += `${date.getMonth() + 1}`;
            };
            if (date.getDate() + 1 <= 10) {
                nowDate += `0${date.getDate()}`;
            } else {
                nowDate += `${date.getDate()}`;
            };
            console.log(nowDate); // 格式化为YYYYMMDD
            let dayAnchor = document.getElementById("dayAnchor");
            dayAnchor.href = `/day?day=${nowDate}`;
            console.log("每日数据url修改完成");
        };

        // DOM加载后,分割列表并执行对应函数
        window.addEventListener("DOMContentLoaded", function() {
            urlWrite();
            dayBranch();
        });
    </script>
    
</body>
</html>
